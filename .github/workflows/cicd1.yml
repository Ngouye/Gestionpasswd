name: CI/CD Deploy AWS EKS via Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # ==========================================================
  # 1. JOB : TESTS UNITAIRES DU BACKEND
  # ==========================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run backend unit tests
        working-directory: backend
        run: mvn -B test

  # ==========================================================
  # 2. JOB : TESTS UNITAIRES DU FRONTEND
  # ==========================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  # ==========================================================
  # 3. JOB UNIQUE : TERRAFORM + BUILD/PUSH + DEPLOY
  # ==========================================================
  delivery-and-deployment:
    name: AWS Infrastructure & Application Deployment
    needs:
      - backend-unit-tests
      - frontend-unit-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Terraform Init & Apply
        working-directory: terraform
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
          terraform validate
          terraform apply -auto-approve

      # Extraction des variables d'environnement locales en direct du State
      - name: Load Infrastructure Context
        id: infra
        working-directory: terraform
        run: |
          echo "BACKEND_URL=$(terraform output -raw backend_repository_url)" >> $GITHUB_ENV
          echo "FRONTEND_URL=$(terraform output -raw frontend_repository_url)" >> $GITHUB_ENV
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Applications to ECR
        run: |
          # Build & Push Backend
          docker build -t ${{ env.BACKEND_URL }}:latest -t ${{ env.BACKEND_URL }}:${{ github.sha }} ./backend
          docker push ${{ env.BACKEND_URL }}:latest
          docker push ${{ env.BACKEND_URL }}:${{ github.sha }}
          
          # Build & Push Frontend
          docker build -t ${{ env.FRONTEND_URL }}:latest -t ${{ env.FRONTEND_URL }}:${{ github.sha }} ./frontend
          docker push ${{ env.FRONTEND_URL }}:latest
          docker push ${{ env.FRONTEND_URL }}:${{ github.sha }}

      - name: Configure kubectl Context
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name "${{ env.CLUSTER_NAME }}"

      - name: Create Kubernetes Secrets & Namespaces
        run: |
          kubectl create namespace gestionmotpasse --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic postgres-secret \
            --from-literal=postgres-username="${{ secrets.POSTGRES_USERNAME }}" \
            --from-literal=postgres-password="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=encryption-key="${{ secrets.ENCRYPTION_KEY }}" \
            -n gestionmotpasse --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Manifests to EKS Cluster
        run: |
          kubectl apply -k ./k8s
          kubectl set image deployment/backend backend="${{ env.BACKEND_URL }}:${{ github.sha }}" -n gestionmotpasse
          kubectl set image deployment/frontend frontend="${{ env.FRONTEND_URL }}:${{ github.sha }}" -n gestionmotpasse
          kubectl rollout status deployment/backend -n gestionmotpasse
          kubectl rollout status deployment/frontend -n gestionmotpasse