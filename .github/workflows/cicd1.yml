name: CI/CD Deploy VPS (Kubernetes via SSH)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # ==========================================================
  # 1. JOB : TESTS UNITAIRES DU BACKEND
  # ==========================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run backend unit tests
        working-directory: backend
        run: mvn -B test

  # ==========================================================
  # 2. JOB : TESTS UNITAIRES DU FRONTEND
  # ==========================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  # ==========================================================
  # 3. JOB : BUILD ET PUSH DES IMAGES DOCKER
  # ==========================================================
  build-and-push:
    name: Build and Push Docker Images
    needs:
      - backend-unit-tests
      - frontend-unit-tests
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define Image Tags
        id: meta
        run: |
          REGISTRY="docker.io"
          USERNAME="${{ secrets.DOCKER_USERNAME }}"
          echo "backend_image=${REGISTRY}/${USERNAME}/gestionmotpasse-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend_image=${REGISTRY}/${USERNAME}/gestionmotpasse-frontend:latest" >> $GITHUB_OUTPUT

      - name: Log in to Docker registry
        uses: docker/login-action@v5
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}

  # ==========================================================
  # 4. JOB : DÉPLOIEMENT VIA TUNNEL SSH SUR LE VPS
  # ==========================================================
  deploy:
    name: Deploy to VPS via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuration manuelle et robuste de SSH (Évite les bugs d'extensions de l'API GitHub)
      - name: Configure SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # Étape de déploiement à l'intérieur du VPS
      - name: Execute remote deployment commands
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
        run: |
          # 1. Envoi des manifestes Kubernetes via rsync en utilisant la clé configurée
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./k8s/ \
            $VPS_USER@$VPS_HOST:~/gestionmotpasse/k8s/

          # 2. Connexion SSH pour appliquer les changements sur le VPS sous l'utilisateur ngouye
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $VPS_SSH_PORT $VPS_USER@$VPS_HOST << EOF
            set -e
            cd ~/gestionmotpasse/k8s/
          
            echo "☸️ Application des manifestes Kubernetes sur le VPS..."
            kubectl apply -k .
          
            echo "🔄 Injection des nouvelles images..."
            kubectl set image deployment/backend backend=${BACKEND_IMAGE} -n gestionmotpasse
            kubectl set image deployment/frontend frontend=${FRONTEND_IMAGE} -n gestionmotpasse
          
            echo "⏳ Validation du déploiement..."
            kubectl rollout status deployment/backend -n gestionmotpasse
            kubectl rollout status deployment/frontend -n gestionmotpasse
          EOF