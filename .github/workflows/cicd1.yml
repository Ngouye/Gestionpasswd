name: CI/CD Deploy AWS EKS via Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # ==========================================================
  # 1. JOB : TESTS UNITAIRES DU BACKEND
  # ==========================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run backend unit tests
        working-directory: backend
        run: mvn -B test

  # ==========================================================
  # 2. JOB : TESTS UNITAIRES DU FRONTEND
  # ==========================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  # ==========================================================
  # 3. JOB : DÉPLOIEMENT INFRASTRUCTURE AWS AVEC TERRAFORM
  # ==========================================================
  terraform-apply:
    name: Terraform Apply AWS Infrastructure
    needs:
      - backend-unit-tests
      - frontend-unit-tests
    runs-on: ubuntu-latest
    environment: production
    outputs:
      backend_repository_url: ${{ steps.tf_outputs.outputs.backend_repository_url }}
      frontend_repository_url: ${{ steps.tf_outputs.outputs.frontend_repository_url }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform init and validate
        working-directory: terraform
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
          terraform fmt -check
          terraform validate

      - name: Terraform apply
        id: tf_apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve

      - name: Export Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "backend_repository_url=$(terraform output -raw backend_repository_url)" >> $GITHUB_OUTPUT
          echo "frontend_repository_url=$(terraform output -raw frontend_repository_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT

  # ==========================================================
  # 4. JOB : BUILD ET PUSH DES IMAGES DOCKER VERS AWS ECR
  # ==========================================================
  build-and-push:
    name: Build and Push Docker Images
    needs:
      - terraform-apply
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define Image Tags
        id: meta
        run: |
          BACKEND_IMAGE="${{ needs.terraform-apply.outputs.backend_repository_url }}:latest"
          FRONTEND_IMAGE="${{ needs.terraform-apply.outputs.frontend_repository_url }}:latest"
          echo "backend_image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "frontend_image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        run: |
          BACKEND_REGISTRY=$(echo "${{ needs.terraform-apply.outputs.backend_repository_url }}" | cut -d'/' -f1)
          FRONTEND_REGISTRY=$(echo "${{ needs.terraform-apply.outputs.frontend_repository_url }}" | cut -d'/' -f1)
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin "$BACKEND_REGISTRY"
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin "$FRONTEND_REGISTRY"

      - name: Build and push backend image
        run: |
          docker build -t backend-image ./backend
          docker tag backend-image "${{ needs.terraform-apply.outputs.backend_repository_url }}:latest"
          docker push "${{ needs.terraform-apply.outputs.backend_repository_url }}:latest"

      - name: Build and push frontend image
        run: |
          docker build -t frontend-image ./frontend
          docker tag frontend-image "${{ needs.terraform-apply.outputs.frontend_repository_url }}:latest"
          docker push "${{ needs.terraform-apply.outputs.frontend_repository_url }}:latest"

  # ==========================================================
  # 5. JOB : DÉPLOIEMENT SUR EKS AVEC KUBECTL
  # ==========================================================
  deploy:
    name: Deploy to AWS EKS
    needs:
      - terraform-apply
      - build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubectl for EKS cluster
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name "${{ needs.terraform-apply.outputs.cluster_name }}"

      - name: Create Kubernetes secrets
        env:
          ALB_CERTIFICATE_ARN: ${{ secrets.ALB_CERTIFICATE_ARN }}
        run: |
          kubectl create namespace gestionmotpasse --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic postgres-secret \
            --from-literal=postgres-username="${{ secrets.POSTGRES_USERNAME }}" \
            --from-literal=postgres-password="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=encryption-key="${{ secrets.ENCRYPTION_KEY }}" \
            -n gestionmotpasse --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k ./k8s
          kubectl set image deployment/backend backend="${{ needs.build-and-push.outputs.backend_image }}" -n gestionmotpasse
          kubectl set image deployment/frontend frontend="${{ needs.build-and-push.outputs.frontend_image }}" -n gestionmotpasse
          kubectl rollout status deployment/backend -n gestionmotpasse
          kubectl rollout status deployment/frontend -n gestionmotpasse