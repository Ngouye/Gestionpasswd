name: CI/CD Pipeline - GestionMotPasse

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  # 1. TESTS UNITAIRES
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: mvn -B test
        working-directory: backend

  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci && npm test
        working-directory: frontend

  # 2. INFRASTRUCTURE (Terraform)
  terraform:
    needs: [backend-unit-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.outputs.outputs.BACKEND_URL }}
      cluster_name: ${{ steps.outputs.outputs.CLUSTER_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v3
        with: { aws-region: ${{ secrets.AWS_REGION }}, aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}, aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} }
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=${{ secrets.TF_STATE_KEY }}" -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
          terraform apply -auto-approve
          echo "BACKEND_URL=$(terraform output -raw backend_repository_url)" >> $GITHUB_ENV
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV

  # 3. BUILD & DEPLOY
  deploy:
    needs: [terraform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v3
        with: { aws-region: ${{ secrets.AWS_REGION }}, aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}, aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} }

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        run: |
          docker build -t ${{ env.BACKEND_URL }}:${{ github.sha }} ./backend
          docker push ${{ env.BACKEND_URL }}:${{ github.sha }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}
          kubectl set image deployment/backend backend=${{ env.BACKEND_URL }}:${{ github.sha }} -n gestionmotpasse
          kubectl rollout status deployment/backend -n gestionmotpasse --timeout=120s