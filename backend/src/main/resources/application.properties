server.port=8080

# On utilise des variables d'environnement. Si elles n'existent pas, on met une valeur par dķfaut aprĶs le ":"
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gestionmotdepasse}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ngouye2001}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Variables pour la sķcuritķ
app.encryption.key=${ENCRYPTION_KEY:1234567890123456}
app.jwt.secret=${JWT_SECRET:change-me-secret-key-please-update}
app.jwt.expiration-ms=86400000