# On dit ŗ Spring d'utiliser une base de donnťes en mťmoire (H2) qui se crťe et s'ťteint instantanťment
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# On force Hibernate ŗ s'adapter ŗ H2 pour le test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# On remplit les autres variables obligatoires pour pas que Spring r‚le
app.encryption.key=1234567890123456
app.jwt.secret=secret-de-test-uniquement-pour-la-ci-github
app.jwt.expiration-ms=3600000