version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestionmotpasse-backend
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: h2
      JAVA_OPTS: '-Xmx512m'
    networks:
      - gestionnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestionmotpasse-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - gestionnet

networks:
  gestionnet:
    driver: bridge
